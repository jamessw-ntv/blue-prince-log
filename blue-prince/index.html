<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blue Prince — Room &amp; Item Log</title>
<link rel="stylesheet" href="../assets/hub.css" />
<style>
  /* page-specific viewer styles (tokens come from hub.css) */
  header.page{padding:20px 22px 8px}
  h1{margin:0 0 4px;font-size:22px;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:13px}
  .sub b{color:var(--text)}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .controls{display:flex;align-items:center;gap:10px;padding-top:2px}
  nav{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
  nav button{background:var(--panel);color:var(--muted);border:1px solid var(--line);
    padding:7px 13px;border-radius:999px;cursor:pointer;font-size:13px}
  nav button:hover{color:var(--text)}
  nav button.active{background:var(--accent);color:#08101f;border-color:var(--accent);font-weight:600}
  nav button .ct{opacity:.7;font-size:11px;margin-left:5px}
  #search{width:100%;padding:10px 12px;margin:0 0 16px;border-radius:10px;
    border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:14px}
  /* cards (puzzles, notes, tips) */
  .card h3{margin:0 0 6px;font-size:16px;display:flex;align-items:center;gap:8px;justify-content:space-between}
  .card h3 .nm{display:flex;align-items:center;gap:8px;min-width:0}
  .card h3 .nm span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .eff{color:var(--text);margin:6px 0}
  .meta{color:var(--muted);font-size:12.5px;margin:2px 0}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(255,255,255,.25);display:inline-block}
  .swatch-blue{background:var(--blue)} .swatch-orange{background:var(--orange)}
  .swatch-green{background:var(--green)} .swatch-purple{background:var(--purple)}
  .swatch-yellow{background:var(--yellow)} .swatch-red{background:var(--red)}
  .swatch-black{background:var(--black)}
  .status.open{background:#3a2a11;color:#ffcf8a;border:1px solid #5a4012}
  .status.solved{background:#103226;color:#7ee2b8;border:1px solid #1d5742}
  ul.clues{margin:6px 0 0;padding-left:18px;color:var(--muted)}
  details{margin-top:8px} summary{cursor:pointer;color:var(--accent)}
  details .sol{margin-top:6px;padding:8px 10px;background:var(--panel2);border-radius:8px}
  /* tips */
  #tips{margin:0 0 18px}
  .tips-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);
    margin:0 0 10px;text-transform:uppercase;letter-spacing:.6px}
  .tips-head button{background:none;border:0;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  .tips-head button:hover{color:var(--text)}
  .card.tip{border-left:5px solid var(--yellow)}
  .tip-img{display:block;max-width:100%;height:auto;border-radius:8px;margin:8px 0;border:1px solid var(--line)}
  /* tables (rooms, items) */
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{position:sticky;top:0;background:var(--panel2);color:var(--muted);font-weight:600;
    font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#1b2438}
  td.nm{font-weight:600;white-space:nowrap}
  td.eff{color:var(--muted);max-width:460px;white-space:normal;word-break:break-word}
  td.pic{width:74px}
  .thumb{width:62px;height:46px;object-fit:cover;border-radius:6px;border:1px solid var(--line);display:block}
  .rtags{margin-top:5px}
  .empty{color:var(--muted);padding:30px;text-align:center}
  .err{color:#ffb4b4;background:#2a1414;border:1px solid #532;padding:14px;border-radius:10px;margin-top:16px}
</style>
</head>
<body>
<div class="hubbar">
  <a class="backlink" href="../">← Hub</a>
  <span class="crumb"><b>Blue Prince</b> · Room &amp; Item Log</span>
</div>
<header class="page">
  <div class="wrap" style="padding-bottom:0">
    <div class="topbar">
      <div class="titlebox">
        <h1 id="title">Blue Prince — Room &amp; Item Log</h1>
        <div class="sub" id="subtitle">Loading…</div>
      </div>
      <div class="controls">
        <button id="tipsBtn" type="button" class="toggle" aria-pressed="false">💡 Tips</button>
      </div>
    </div>
  </div>
</header>
<div class="wrap">
  <nav id="nav"></nav>
  <input id="search" type="search" placeholder="Filter…" autocomplete="off" />
  <div id="tips" class="hidden"></div>
  <div id="view"></div>
  <div id="error"></div>
  <footer class="site" id="footer"></footer>
</div>

<script>
// Raw URL points at the post-rename repo name (jamessw-ntv.github.io). Before the
// rename it 404s and we fall back to the same-origin data.json — either way works.
const RAW = "https://raw.githubusercontent.com/jamessw-ntv/jamessw-ntv.github.io/main/blue-prince/data.json";
const COLORS = ["blue","orange","green","purple","yellow","red","black"];
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const nl2br = s => esc(s).replace(/\n/g,"<br>");

let DATA=null, TAB="rooms", Q="", TIPS_ON=false;
const TABS=[["rooms","Rooms"],["items","Items"],["puzzles","Puzzles"],["notes","Notes"]];

async function load(){
  // Raw URL first (updates within seconds of a push — no need to wait for the Pages
  // rebuild), with a cache-buster. Fall back to the same-origin copy (e.g. file://).
  const bust="?_="+Date.now();
  for(const url of [RAW+bust, "data.json"+bust]){
    try{ const r=await fetch(url,{cache:"no-store"}); if(r.ok){ return [await r.json(), url.split("?")[0]]; } }catch(e){}
  }
  throw new Error("Could not load data.json (tried "+RAW+" and same-origin).");
}

function colorDot(c){ return COLORS.includes(c) ? `<span class="dot swatch-${c}" title="${esc(c)}"></span>` : ""; }
function badges(arr){ return (arr||[]).map(t=>`<span class="b tag">${esc(t)}</span>`).join(""); }
function tagsInline(arr){ return (arr&&arr.length)?`<div class="rtags badges">${badges(arr)}</div>`:""; }
function thumb(src){ return src?`<a href="${esc(src)}" target="_blank" rel="noopener"><img class="thumb" src="${esc(src)}" alt="" loading="lazy"></a>`:""; }

function roomsTable(rows){
  const head=`<thead><tr><th>Pic</th><th>Room</th><th>Effect</th><th>Notes</th></tr></thead>`;
  const body="<tbody>"+rows.map(r=>{
    const vnames=(r.variants||[]).map(v=>v.name).join(", ");
    const vbadge=(r.variants||[]).length?` <span class="b" title="Variants: ${esc(vnames)}">▸${r.variants.length}</span>`:"";
    return `<tr>`+
      `<td class="pic">${thumb(r.image)}</td>`+
      `<td class="nm">${colorDot(r.color)} ${esc(r.name)}${vbadge}${tagsInline(r.tags)}</td>`+
      `<td class="eff">${esc(r.effect||"")}</td>`+
      `<td class="eff">${esc(r.notes||"")}</td>`+
    `</tr>`;
  }).join("")+"</tbody>";
  return `<div class="tablewrap"><table>${head}${body}</table></div>`;
}

function itemsTable(rows){
  const head=`<thead><tr><th>Pic</th><th>Item</th><th>Effect</th><th>Notes</th></tr></thead>`;
  const body="<tbody>"+rows.map(i=>{
    const details=[i.location, i.notes].filter(Boolean).join(" — ");
    return `<tr>`+
      `<td class="pic">${thumb(i.image)}</td>`+
      `<td class="nm">${esc(i.name)}${tagsInline(i.tags)}</td>`+
      `<td class="eff">${esc(i.effect||"")}</td>`+
      `<td class="eff">${esc(details)}</td>`+
    `</tr>`;
  }).join("")+"</tbody>";
  return `<div class="tablewrap"><table>${head}${body}</table></div>`;
}

function puzzleCard(p){
  const bits=[`<div class="meta">${p.location?esc(p.location):"—"}</div>`];
  if((p.clues||[]).length) bits.push(`<ul class="clues">${p.clues.map(c=>`<li>${esc(c)}</li>`).join("")}</ul>`);
  if(p.solution) bits.push(`<details><summary>Show solution (spoiler)</summary><div class="sol">${nl2br(p.solution)}</div></details>`);
  if(p.notes) bits.push(`<div class="meta">${esc(p.notes)}</div>`);
  const st=(p.status||"open").toLowerCase();
  return `<div class="card"><h3><span class="nm"><span>${esc(p.name)}</span></span><span class="status ${st}">${esc(st)}</span></h3>${bits.join("")}<div class="badges">${badges(p.tags)}</div></div>`;
}

function noteCard(n){
  const scope=(n.scope||"permanent");
  const badge = scope==="run"
    ? `<span class="status open" title="Run-specific — not kept long term">run-specific</span>`
    : `<span class="status solved" title="Permanent — kept across runs">permanent</span>`;
  const img=n.image?`<img class="tip-img" src="${esc(n.image)}" alt="" loading="lazy">`:"";
  return `<div class="card"><h3 style="font-size:13px"><span class="nm"><span>${esc(n.date||"")}</span></span>${badge}</h3>${img}<div class="eff">${nl2br(n.text)}</div><div class="badges">${badges(n.tags)}</div></div>`;
}

function tipCard(t){
  const img=t.image?`<img class="tip-img" src="${esc(t.image)}" alt="${esc(t.title||"tip image")}" loading="lazy">`:"";
  return `<div class="card tip">${t.title?`<h3><span class="nm"><span>${esc(t.title)}</span></span></h3>`:""}${img}${t.body?`<div class="eff">${nl2br(t.body)}</div>`:""}<div class="badges">${badges(t.tags)}</div></div>`;
}
function renderTips(){
  const el=document.getElementById("tips");
  if(!TIPS_ON){ el.classList.add("hidden"); el.innerHTML=""; return; }
  el.classList.remove("hidden");
  const tips=(DATA&&DATA.tips)?DATA.tips:[];
  el.innerHTML=`<div class="tips-head"><span>Tips &amp; examples</span><button id="tipsClose" type="button" aria-label="Close">×</button></div>`+
    (tips.length?`<div class="grid">${tips.map(tipCard).join("")}</div>`:`<div class="empty">No tips yet.</div>`);
  const c=document.getElementById("tipsClose");
  if(c) c.onclick=()=>{ TIPS_ON=false; const b=document.getElementById("tipsBtn"); b.classList.remove("active"); b.setAttribute("aria-pressed","false"); renderTips(); };
}

function matches(obj){ return !Q || JSON.stringify(obj).toLowerCase().includes(Q); }

function render(){
  const v=document.getElementById("view");
  let rows, html;
  if(TAB==="rooms"){ rows=(DATA.rooms||[]).filter(matches); html=rows.length?roomsTable(rows):""; }
  else if(TAB==="items"){ rows=(DATA.items||[]).filter(matches); html=rows.length?itemsTable(rows):""; }
  else if(TAB==="puzzles"){ rows=(DATA.puzzles||[]).filter(matches); html=rows.length?`<div class="grid">${rows.map(puzzleCard).join("")}</div>`:""; }
  else if(TAB==="notes"){ rows=(DATA.notes||[]).filter(matches); html=rows.length?`<div class="grid">${rows.map(noteCard).join("")}</div>`:""; }
  v.innerHTML = html || `<div class="empty">Nothing here${Q?" matches your filter":" yet"}.</div>`;
}

function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML=TABS.map(([k,label])=>{
    const ct=(DATA[k]||[]).length;
    return `<button data-tab="${k}" class="${k===TAB?"active":""}">${label}<span class="ct">${ct}</span></button>`;
  }).join("");
  nav.querySelectorAll("button").forEach(b=>b.onclick=()=>{TAB=b.dataset.tab;renderNav();render();});
}

(async function(){
  try{
    const [data,src]=await load();
    DATA=data;
    const m=data.meta||{};
    document.getElementById("title").textContent=m.title||"Blue Prince — Log";
    document.getElementById("subtitle").innerHTML=
      `updated <b>${esc(m.updated||"?")}</b>`+(m.source?` · <a href="${esc(m.source)}">source</a>`:"");
    document.getElementById("footer").innerHTML=
      `Read-only viewer · data from <code>${esc(src)}</code>`+(m.source?` · <a href="${esc(m.source)}">repo</a>`:"");
    renderNav(); render();
  }catch(e){
    document.getElementById("subtitle").textContent="";
    document.getElementById("error").innerHTML=`<div class="err">${esc(e.message||e)}</div>`;
  }
})();

function wireControls(){
  const tb=document.getElementById("tipsBtn");
  tb.onclick=()=>{ TIPS_ON=!TIPS_ON; tb.classList.toggle("active",TIPS_ON); tb.setAttribute("aria-pressed",String(TIPS_ON)); renderTips(); };
  document.getElementById("search").addEventListener("input",e=>{ Q=e.target.value.trim().toLowerCase(); render(); });
}
wireControls();
</script>
</body>
</html>
