name: Deploy viewer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to enable Pages and publish to it.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true turns Pages on (build type "workflow") if it isn't already.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish the whole repo root (index.html + data.json) as the site.
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
