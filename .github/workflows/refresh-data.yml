name: Refresh dashboard data

on:
  schedule:
    - cron: "7 * * * *"      # hourly, at :07 (off the top of the hour)
  workflow_dispatch:          # lets you trigger a refresh by hand from the Actions tab

permissions:
  contents: write

# Don't stack runs; let an in-flight refresh finish before the next starts.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/refresh_sports.py   || echo "::warning::sports refresh exited non-zero"
          python scripts/refresh_personal.py || echo "::warning::personal refresh exited non-zero"

      - name: Commit if changed
        run: |
          git config user.name "data-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "data: scheduled refresh ($(date -u +%FT%TZ))"
            git push
            echo "Pushed refreshed data."
          else
            echo "No data changes this run."
          fi
