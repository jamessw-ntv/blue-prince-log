<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>jamessw · projects</title>
<link rel="stylesheet" href="assets/hub.css" />
<style>
  /* page-specific bits for the landing menu */
  .hero{max-width:var(--maxw);margin:0 auto;padding:40px 22px 10px}
  .hero h1{margin:0 0 6px;font-size:30px;letter-spacing:.2px}
  .hero p{margin:0;color:var(--muted);font-size:15px;max-width:60ch}
  .section-label{max-width:var(--maxw);margin:26px auto 0;padding:0 22px;
    color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px}
</style>
</head>
<body>
<div class="hero">
  <h1>James&nbsp;— projects</h1>
  <p>A little hub for the things I'm building: logs, trackers, timelines and other
     experiments. Everything here is its own self-contained corner.</p>
</div>

<div class="section-label">Projects</div>
<div class="wrap" style="padding-top:14px">
  <div class="grid" id="grid"></div>
</div>

<footer class="site" id="footer"></footer>

<script>
/* To add a project: drop its folder in the repo, then add a card here.
   Use a relative `href` (e.g. "sports/") so links work before and after the
   repo is renamed to jamessw-ntv.github.io. status: "active" | "wip" | "planned".
   Leave href "" for planned projects that don't have a page yet. */
const PROJECTS = [
  { ico:"📊", title:"Personal Dashboard", href:"personal/",
    status:"active", desc:"Your morning briefing in one place: Ferntree Gully weather, ASX and crypto, a release radar for comics, books, games and film, and a dev radar for your repos. Auto-refreshes hourly." },
  { ico:"🏛️", title:"Blue Prince — Room & Item Log", href:"blue-prince/",
    status:"active", desc:"Spoiler-free notepad of rooms, items, codes and puzzles, logged from my own play." },
  { ico:"🎲", title:"AI Dungeon Master", href:"campaign/",
    status:"wip", desc:"Live second-screen dashboard for a chat-run D&D / LitRPG campaign — party HP, dungeon map, quests and a System log, auto-refreshing from state.json." },
  { ico:"🏆", title:"Multi-Sport Dashboard", href:"sports/",
    status:"active", desc:"World Cup 2026, AFL (Carlton) and NRL (Storm + Origin) in one glanceable view, with path-to-glory gates for each team." },
  { ico:"🖖", title:"Trek & Wars — Comics + Books Timeline", href:"trek-wars/",
    status:"active", desc:"Visual timeline of every Star Trek & Star Wars comic and novel, 1967–present — tap any series for details." },
  { ico:"🏭", title:"Satisfactory 1.0 — Build Planner", href:"satisfactory/",
    status:"active", desc:"A build-once plan to take one Satisfactory 1.0 save from the HUB to a finished Space Elevator — guided step-by-step, build map, blueprints, power and trains, fully offline." },
];

const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const STATUS = { active:"active", wip:"in progress", planned:"planned" };

function card(p){
  const live = p.href && p.status!=="planned";
  const tag = `<div class="badges"><span class="status ${esc(p.status)}">${esc(STATUS[p.status]||p.status)}</span></div>`;
  const inner = `<div class="ico">${esc(p.ico||"📦")}</div><h3>${esc(p.title)}</h3><p>${esc(p.desc||"")}</p>${tag}`;
  return live
    ? `<a class="card" href="${esc(p.href)}">${inner}</a>`
    : `<div class="card disabled">${inner}</div>`;
}

document.getElementById("grid").innerHTML = PROJECTS.map(card).join("");
document.getElementById("footer").innerHTML =
  `Built and maintained with Claude · <a href="docs/PORTING.md">how projects get added</a>`;
</script>
</body>
</html>
