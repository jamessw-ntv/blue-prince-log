<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>jamessw · projects</title>
<link rel="stylesheet" href="assets/hub.css" />
<style>
  /* page-specific bits for the landing menu */
  .hero{max-width:var(--maxw);margin:0 auto;padding:38px 22px 6px}
  .hero h1{margin:0 0 6px;font-size:30px;letter-spacing:.2px}
  .hero p{margin:0;color:var(--muted);font-size:15px;max-width:60ch}

  /* ---- reorderable blocks ---- */
  .blocks{max-width:var(--maxw);margin:18px auto 0;padding:0 22px;display:flex;flex-direction:column;gap:18px}
  .block{background:transparent;border-radius:var(--radius);transition:opacity .15s}
  .block.dragging{opacity:.6}
  .block-head{display:flex;align-items:center;gap:10px;margin:0 2px 10px}
  .block-head h2{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
  .block-head .grow{flex:1}
  .block-head .block-meta{color:var(--muted);font-size:12px}
  .block-head .open-link{color:var(--accent);font-size:12px;text-decoration:none}
  .block-head .open-link:hover{text-decoration:underline}
  .drag-handle{touch-action:none;cursor:grab;color:var(--muted);font-size:16px;line-height:1;
    user-select:none;padding:2px 4px;border-radius:6px}
  .drag-handle:hover{color:var(--text);background:var(--panel2)}
  .block.dragging .drag-handle{cursor:grabbing}

  /* ---- briefing (weather) ---- */
  .wx{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .wx .now{display:flex;align-items:center;gap:14px;min-width:200px}
  .wx .now .ico{font-size:38px;line-height:1}
  .wx .now .t{font-size:38px;font-weight:800;font-variant-numeric:tabular-nums}
  .wx .now .meta{color:var(--muted);font-size:13px}
  .wx .now .meta b{color:var(--text)}
  .wx .days{display:flex;gap:10px;flex:1;flex-wrap:wrap}
  .wx .day{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;text-align:center;min-width:78px;flex:1}
  .wx .day .d{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .wx .day .ic{font-size:22px;margin:3px 0}
  .wx .day .r{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
  .wx .day .r small{color:var(--muted);font-weight:400}

  /* ---- markets ---- */
  .mk{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .tick{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;box-shadow:var(--shadow)}
  .tick .code{font-size:13px;font-weight:700}
  .tick .nm{color:var(--muted);font-size:11px;margin-bottom:6px}
  .tick .px{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
  .tick .pct{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
  .blk-empty{color:var(--muted);font-size:13px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px 16px}
</style>
</head>
<body>
<div class="hero">
  <h1>James&nbsp;— projects</h1>
  <p>A little hub for the things I'm building: logs, trackers, timelines and other
     experiments. Drag the ⠿ handles to reorder the blocks; your layout is remembered.</p>
</div>

<div class="blocks" id="blocks">
  <section class="block" data-block="briefing">
    <div class="block-head">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <h2>Briefing</h2>
      <span class="grow"></span>
      <span class="block-meta" id="wxMeta"></span>
      <a class="open-link" href="personal/">Open dashboard →</a>
    </div>
    <div class="block-body" id="wxBox"></div>
  </section>

  <section class="block" data-block="markets">
    <div class="block-head">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <h2>Markets</h2>
      <span class="grow"></span>
      <span class="block-meta" id="mkMeta"></span>
      <a class="open-link" href="personal/">Open dashboard →</a>
    </div>
    <div class="block-body" id="mkBox"></div>
  </section>

  <section class="block" data-block="projects">
    <div class="block-head">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <h2>Projects</h2>
    </div>
    <div class="block-body"><div class="grid" id="grid"></div></div>
  </section>
</div>

<footer class="site" id="footer"></footer>

<script>
/* To add a project: drop its folder in the repo, then add a card here.
   Use a relative `href` (e.g. "sports/") so links work before and after the
   repo is renamed to jamessw-ntv.github.io. status: "active" | "wip" | "planned".
   Leave href "" for planned projects that don't have a page yet. */
const PROJECTS = [
  { ico:"📊", title:"Personal Dashboard", href:"personal/",
    status:"active", desc:"Your morning briefing in one place: Ferntree Gully weather plus a live look at crypto and the ASX. Auto-refreshes hourly." },
  { ico:"🏛️", title:"Blue Prince — Room & Item Log", href:"blue-prince/",
    status:"active", desc:"Spoiler-free notepad of rooms, items, codes and puzzles, logged from my own play." },
  { ico:"🎲", title:"AI Dungeon Master", href:"campaign/",
    status:"wip", desc:"Live second-screen dashboard for a chat-run D&D / LitRPG campaign — party HP, dungeon map, quests and a System log, auto-refreshing from state.json." },
  { ico:"🏆", title:"Multi-Sport Dashboard", href:"sports/",
    status:"active", desc:"World Cup 2026, AFL (Carlton) and NRL (Storm + Origin) in one glanceable view, with path-to-glory gates for each team." },
  { ico:"🖖", title:"Trek & Wars — Comics + Books Timeline", href:"trek-wars/",
    status:"active", desc:"Visual timeline of every Star Trek & Star Wars comic and novel, 1967–present — tap any series for details." },
  { ico:"🏭", title:"Satisfactory 1.0 — Build Planner", href:"satisfactory/",
    status:"active", desc:"A build-once plan to take one Satisfactory 1.0 save from the HUB to a finished Space Elevator — guided step-by-step, build map, blueprints, power and trains, fully offline." },
];

const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const STATUS = { active:"active", wip:"in progress", planned:"planned" };
const num = (v,d=2) => (v==null||isNaN(v)) ? "—" : Number(v).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});

function card(p){
  const live = p.href && p.status!=="planned";
  const tag = `<div class="badges"><span class="status ${esc(p.status)}">${esc(STATUS[p.status]||p.status)}</span></div>`;
  const inner = `<div class="ico">${esc(p.ico||"📦")}</div><h3>${esc(p.title)}</h3><p>${esc(p.desc||"")}</p>${tag}`;
  return live
    ? `<a class="card" href="${esc(p.href)}">${inner}</a>`
    : `<div class="card disabled">${inner}</div>`;
}
document.getElementById("grid").innerHTML = PROJECTS.map(card).join("");
document.getElementById("footer").innerHTML =
  `Built and maintained with Claude · <a href="docs/PORTING.md">how projects get added</a>`;

/* ---------- live briefing + markets (from the personal dashboard feed) -------- */
const RAW = "https://raw.githubusercontent.com/jamessw-ntv/jamessw-ntv.github.io/main/personal/data.json";
async function loadFeed(){
  const bust = "?_=" + Date.now();
  for(const url of [RAW + bust, "personal/data.json" + bust]){
    try{ const r = await fetch(url,{cache:"no-store"}); if(r.ok) return await r.json(); }catch(e){}
  }
  return null;
}
function pctCls(p){ return p==null ? "flat" : p>0 ? "up" : p<0 ? "down" : "flat"; }
function pctStr(p){ return p==null ? "—" : (p>0?"+":"") + Number(p).toFixed(2) + "%"; }
function stampAge(meta){
  if(!meta || !meta.fetched) return "";
  const t = new Date(meta.fetched), mins = Math.max(0, Math.round((Date.now()-t.getTime())/60000));
  return mins<1 ? "updated just now" : mins<60 ? "updated "+mins+"m ago"
    : mins<1440 ? "updated "+Math.round(mins/60)+"h ago" : "updated "+t.toISOString().slice(0,10);
}

function renderBriefing(d){
  const box = document.getElementById("wxBox");
  const w = (d && d.weather) || {}; const n = w.now || {};
  if(n.temp == null && !(w.days||[]).length){ box.innerHTML = `<div class="blk-empty">Live weather isn't available right now.</div>`; return; }
  const days = (w.days||[]).slice(0,3).map(x=>`<div class="day">
      <div class="d">${esc(x.day)}</div><div class="ic">${esc(x.icon||"")}</div>
      <div class="r">${x.max==null?"—":Math.round(x.max)}°<small> / ${x.min==null?"—":Math.round(x.min)}°</small></div>
    </div>`).join("");
  box.innerHTML = `<div class="wx">
      <div class="now"><div class="ico">${esc(n.icon||"")}</div>
        <div><div class="t">${n.temp==null?"—":Math.round(n.temp)}°</div>
          <div class="meta"><b>${esc(n.desc||"")}</b> · ${esc(w.place||"")}</div></div>
      </div>
      <div class="days">${days}</div>
    </div>`;
}
function tick(r){
  return `<div class="tick"><div class="code">${esc(r.code)}</div><div class="nm">${esc(r.name||"")}</div>
    <div class="px">${r.price==null?"—":"$"+num(r.price, r.price>=1000?0:2)}</div>
    <div class="pct ${pctCls(r.pct)}">${pctStr(r.pct)}</div></div>`;
}
function renderMarkets(d){
  const box = document.getElementById("mkBox");
  const m = (d && d.markets) || {};
  const rows = [...(m.crypto||[]), ...((m.asx||[]).filter(r=>r.price!=null))];
  box.innerHTML = rows.length ? `<div class="mk">${rows.map(tick).join("")}</div>`
    : `<div class="blk-empty">Live market data isn't available right now.</div>`;
}

(async function(){
  const d = await loadFeed();
  renderBriefing(d); renderMarkets(d);
  const age = stampAge(d && d.meta);
  document.getElementById("wxMeta").textContent = age;
  document.getElementById("mkMeta").textContent = age;
})();

/* ---------- drag-to-reorder blocks (pointer-based: mouse + touch) ------------- */
const ORDER_KEY = "hubBlockOrder.v1";
const blocksEl = document.getElementById("blocks");
function saveOrder(){
  const ids = [...blocksEl.querySelectorAll(".block")].map(el=>el.dataset.block);
  try{ localStorage.setItem(ORDER_KEY, JSON.stringify(ids)); }catch(e){}
}
function applySavedOrder(){
  let saved; try{ saved = JSON.parse(localStorage.getItem(ORDER_KEY)||"null"); }catch(e){ saved=null; }
  if(!Array.isArray(saved)) return;
  saved.forEach(id=>{ const el = blocksEl.querySelector(`.block[data-block="${id}"]`); if(el) blocksEl.appendChild(el); });
}
applySavedOrder();

blocksEl.querySelectorAll(".drag-handle").forEach(h=>{
  h.addEventListener("pointerdown", e=>{
    e.preventDefault();
    const dragEl = h.closest(".block");
    dragEl.classList.add("dragging");
    try{ h.setPointerCapture(e.pointerId); }catch(_){}
    const move = ev=>{
      const others = [...blocksEl.querySelectorAll(".block:not(.dragging)")];
      const before = others.find(b=>{ const r=b.getBoundingClientRect(); return ev.clientY < r.top + r.height/2; });
      if(before) blocksEl.insertBefore(dragEl, before);
      else blocksEl.appendChild(dragEl);
    };
    const up = ()=>{
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
      dragEl.classList.remove("dragging");
      saveOrder();
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  });
});
</script>
</body>
</html>
