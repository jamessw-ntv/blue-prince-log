<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trek &amp; Wars — Comics + Books Timeline</title>
<!-- Shared hub design system. This folder is one level deep, so ../assets/. -->
<link rel="stylesheet" href="../assets/hub.css" />
<style>
/* Project styles. Chrome names are aliased onto hub tokens (so we never
   redefine them); the comics/books/status palette is this project's own. */
:root {
  --surface:  var(--panel);
  --surface2: var(--panel2);
  --border:   var(--line);
  --faint:    var(--black);

  --trek: #3ab8ff;
  --wars: #f5c842;
  --comics: #e03070;
  --books: #42e0a0;
  --done: #3ddc84;
  --live: #ff7043;
  --soon: #a78bfa;
  --legends: #9966cc;

  --labelw: 210px;            /* width of the row label column on desktop */
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

/* ── intro / legend ─────────────────────────────────────────────────────── */
.legend { display: flex; flex-wrap: wrap; gap: 14px 18px; align-items: center;
  margin: 14px 0 4px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend i { width: 16px; height: 9px; border-radius: 5px; display: inline-block; }
.legend i.comic { background: var(--comics); }
.legend i.book  { background: var(--books); }
.legend i.legends { background: var(--legends); opacity: .55; }
.legend i.upcoming { background: transparent; border: 1.5px dashed var(--muted); }
.legend .hint { color: var(--muted); opacity: .8; }

/* ── time ruler (sticky) ────────────────────────────────────────────────── */
.tl-ruler { display: flex; gap: 12px; padding: 6px 4px 0; position: sticky; top: 0;
  z-index: 5; background: var(--bg); }
.tl-ruler .pad { width: var(--labelw); flex: 0 0 auto; }
.tl-ruler .track { position: relative; flex: 1; height: 20px; border-bottom: 1px solid var(--border); }
.tl-ruler .track span { position: absolute; transform: translateX(-50%); top: 3px;
  font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }

/* ── sections (swimlanes) ───────────────────────────────────────────────── */
.tl-section { border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); margin-bottom: 12px; overflow: hidden; }
.tl-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px;
  cursor: pointer; background: var(--surface2); user-select: none; }
.tl-head:hover { background: #232c47; }
.tl-dot { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto; }
.tl-title { font-weight: 700; font-size: 14px; }
.tl-count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--muted); }
.tl-chev { color: var(--muted); font-size: 11px; transition: transform .2s; }
.tl-section.coll .tl-chev { transform: rotate(-90deg); }
.tl-section.coll .tl-body { display: none; }
.tl-body { padding: 4px 0; }

/* ── a series row ───────────────────────────────────────────────────────── */
.tl-row { display: flex; align-items: center; gap: 12px; padding: 8px 14px;
  cursor: pointer; }
.tl-row + .tl-row { border-top: 1px solid rgba(255,255,255,.03); }
.tl-row:hover { background: var(--faint); }
.tl-label { width: var(--labelw); flex: 0 0 auto; min-width: 0; }
.tl-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
.tl-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }

.tl-track { position: relative; flex: 1 1 auto; height: 26px; border-radius: 6px;
  background-image: var(--grid); }
.tl-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 14px;
  min-width: 7px; border-radius: 7px; }
.tl-bar.comic { background: var(--comics); }
.tl-bar.book  { background: var(--books); }
.tl-bar.legends { opacity: .5; }
.tl-bar.upcoming { background: transparent !important; border: 1.5px dashed var(--comics); }
.tl-bar.upcoming.book { border-color: var(--books); }

/* inline status tags in the label */
.tag { font-family: var(--mono); font-size: 8px; letter-spacing: .3px; padding: 2px 5px;
  border-radius: 4px; vertical-align: middle; white-space: nowrap; }
.tag.legends  { background: rgba(153,102,204,.12); color: var(--legends); border: 1px solid rgba(153,102,204,.35); }
.tag.ongoing  { background: rgba(255,112,67,.12);  color: var(--live);    border: 1px solid rgba(255,112,67,.35); }
.tag.upcoming { background: rgba(167,139,250,.12); color: var(--soon);    border: 1px solid rgba(167,139,250,.35); }

/* ── detail panel (bottom sheet on mobile, centred card on desktop) ─────── */
#scrim { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 290;
  opacity: 0; pointer-events: none; transition: opacity .2s; }
#scrim.open { opacity: 1; pointer-events: auto; }
#detail-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
  border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 14px 16px 30px;
  transform: translateY(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
  z-index: 300; max-height: 80vh; overflow-y: auto; }
#detail-panel.open { transform: translateY(0); }
.dp-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
.dp-title { font-weight: 700; font-size: 17px; line-height: 1.3; margin-bottom: 4px; padding-right: 28px; }
.dp-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 12px; }
.dp-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.dp-tag { font-family: var(--mono); font-size: 8px; padding: 3px 8px; border-radius: 4px; }
.dp-tag.trek    { background: rgba(58,184,255,.12); color: var(--trek); border: 1px solid rgba(58,184,255,.3); }
.dp-tag.wars    { background: rgba(245,200,66,.1);  color: var(--wars); border: 1px solid rgba(245,200,66,.3); }
.dp-tag.comic   { background: rgba(224,48,112,.1);  color: var(--comics); border: 1px solid rgba(224,48,112,.3); }
.dp-tag.book    { background: rgba(66,224,160,.08); color: var(--books); border: 1px solid rgba(66,224,160,.25); }
.dp-tag.legends { background: rgba(153,102,204,.1); color: var(--legends); border: 1px solid rgba(153,102,204,.3); }
.dp-tag.canon   { background: rgba(68,170,255,.1);  color: #44aaff; border: 1px solid rgba(68,170,255,.3); }
.dp-tag.complete{ background: rgba(61,220,132,.1);  color: var(--done); border: 1px solid rgba(61,220,132,.3); }
.dp-tag.ongoing { background: rgba(255,112,67,.1);  color: var(--live); border: 1px solid rgba(255,112,67,.3); }
.dp-tag.upcoming{ background: rgba(167,139,250,.1); color: var(--soon); border: 1px solid rgba(167,139,250,.3); }
.dp-tag.count   { background: rgba(255,255,255,.05); color: var(--muted); border: 1px solid var(--border); }
.dp-body { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 14px; }
.dp-body strong { color: var(--text); } .dp-body em { color: #cdd6ee; }
.dp-avail { display: flex; flex-wrap: wrap; gap: 6px; }
.dp-avail-label { font-family: var(--mono); font-size: 9px; color: var(--muted); width: 100%; margin-bottom: 2px; }
.avail-btn { font-family: var(--mono); font-size: 9px; padding: 6px 10px; border-radius: 6px; text-decoration: none; }
.avail-btn.mu  { background: rgba(224,48,48,.12);  color: #ff9999; border: 1px solid rgba(224,48,48,.3); }
.avail-btn.gc  { background: rgba(58,184,255,.1);  color: #88ccff; border: 1px solid rgba(58,184,255,.3); }
.avail-btn.amz { background: rgba(255,165,0,.1);   color: #ffcc77; border: 1px solid rgba(255,165,0,.3); }
.avail-btn.lcs { background: rgba(140,140,200,.08);color: #aaaacc; border: 1px solid rgba(140,140,200,.25); }
.avail-btn.kindle { background: rgba(255,165,0,.1);color: #ffcc77; border: 1px solid rgba(255,165,0,.3); }
.dp-close { position: absolute; top: 12px; right: 14px; font-size: 22px; color: var(--muted);
  cursor: pointer; background: none; border: none; line-height: 1; }

.err { color: #ffb4b4; background: #2a1414; border: 1px solid #532; padding: 14px; border-radius: 10px; }

@media (min-width: 641px) {
  #detail-panel { left: 50%; right: auto; bottom: 18px; width: 560px;
    max-width: calc(100vw - 40px); border: 1px solid var(--border); border-radius: 16px;
    max-height: calc(100dvh - 120px); transform: translate(-50%, 140%); }
  #detail-panel.open { transform: translate(-50%, 0); }
  .dp-handle { display: none; }
}
@media (max-width: 640px) {
  /* stack the label above its bar so the timeline stays legible on a phone */
  .tl-row { flex-direction: column; align-items: stretch; gap: 6px; }
  .tl-label { width: auto; }
  .tl-ruler .pad { display: none; }
  .tl-ruler { gap: 0; }
}
</style>
</head>
<body>

<!-- Standard hub bar -->
<div class="hubbar">
  <a class="backlink" href="../">← Hub</a>
  <span class="crumb"><b>Trek &amp; Wars</b> · Comics + Books Timeline</span>
</div>

<header class="page">
  <div class="wrap" style="padding-bottom:0">
    <h1>Trek &amp; Wars — Comics &amp; Books Timeline</h1>
    <div class="sub" id="subtitle">Loading…</div>
  </div>
</header>

<div class="wrap">
  <div class="legend">
    <span><i class="comic"></i> Comics</span>
    <span><i class="book"></i> Novels</span>
    <span><i class="legends"></i> Legends / non-canon</span>
    <span><i class="upcoming"></i> Upcoming</span>
    <span class="hint">Tap any row for details · bars span publication years</span>
  </div>

  <div class="tl-ruler" id="ruler"></div>
  <div id="timeline"></div>
  <div id="error"></div>

  <footer class="site">Part of the <a href="../">projects hub</a>. A self-contained, read-only timeline — goes a little stale by design.</footer>
</div>

<!-- DETAIL PANEL -->
<div id="scrim" onclick="closeDetail()"></div>
<div id="detail-panel" role="dialog" aria-modal="true">
  <button class="dp-close" onclick="closeDetail()" aria-label="Close">×</button>
  <div class="dp-handle"></div>
  <div class="dp-title" id="dp-title"></div>
  <div class="dp-sub" id="dp-sub"></div>
  <div class="dp-meta" id="dp-meta"></div>
  <div class="dp-body" id="dp-body"></div>
  <div class="dp-avail" id="dp-avail"></div>
</div>

<script>
// ═══ data ════════════════════════════════════════════════════════════════
// Raw URL updates within seconds of a push; same-origin is the fallback.
const RAW = "https://raw.githubusercontent.com/jamessw-ntv/jamessw-ntv.github.io/main/trek-wars/data.json";
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let DATA = [], BY_ID = {};
const collapsed = {};

const SECTIONS = [
  { key:'trek-comics', label:'Star Trek — Comics', dot:'var(--trek)',  f:d=>d.franchise==='trek'&&d.type==='comic' },
  { key:'trek-books',  label:'Star Trek — Novels', dot:'var(--trek)',  f:d=>d.franchise==='trek'&&d.type==='book'  },
  { key:'wars-comics', label:'Star Wars — Comics', dot:'var(--wars)',  f:d=>d.franchise==='wars'&&d.type==='comic' },
  { key:'wars-books',  label:'Star Wars — Novels', dot:'var(--wars)',  f:d=>d.franchise==='wars'&&d.type==='book'  },
];

// One shared publication-date axis for every bar.
const REL_MIN = 1967, REL_MAX = 2028;
const DECADES = [1970,1980,1990,2000,2010,2020];
const pct = y => ((y - REL_MIN) / (REL_MAX - REL_MIN)) * 100;

function countText(d){
  const u = d.type === 'comic' ? 'issues' : 'books';
  if (d.issues == null)       return `${d.out}+ ${u}`;
  if (d.status === 'upcoming') return `${u} — not out yet`;
  if (d.status === 'ongoing' && d.out < d.issues) return `${d.out}/${d.issues} ${u}`;
  return `${d.issues} ${u}`;
}

function years(d){
  if (d.status === 'ongoing')  return `${Math.floor(d.rel[0])}–now`;
  if (d.status === 'upcoming') return `${Math.floor(d.rel[0])} →`;
  return `${Math.floor(d.rel[0])}–${Math.ceil(d.rel[1])}`;
}

async function loadData(){
  const bust = "?_=" + Date.now();
  for (const url of [RAW + bust, "data.json" + bust]) {
    try { const r = await fetch(url, {cache:"no-store"}); if (r.ok) return await r.json(); } catch(e){}
  }
  throw new Error("Could not load data.json (tried " + RAW + " and same-origin).");
}

// ═══ render ══════════════════════════════════════════════════════════════
function buildGridBackground(){
  // faint vertical decade lines, drawn into every track's background
  const stops = DECADES.map(y => {
    const p = pct(y);
    return `transparent ${p}%, rgba(255,255,255,.05) ${p}%, rgba(255,255,255,.05) calc(${p}% + 1px), transparent calc(${p}% + 1px)`;
  }).join(', ');
  document.documentElement.style.setProperty('--grid', `linear-gradient(90deg, ${stops})`);
}

function renderRuler(){
  const ticks = DECADES.concat([REL_MAX]);
  const spans = ticks.map(y => `<span style="left:${pct(y)}%">${y === REL_MAX ? 'now' : y}</span>`).join('');
  document.getElementById('ruler').innerHTML = `<div class="pad"></div><div class="track">${spans}</div>`;
}

function rowHTML(d){
  const left  = Math.max(0, pct(d.rel[0]));
  const right = Math.min(100, pct(d.rel[1]));
  const width = Math.max(right - left, 1.4);

  const bar = ['tl-bar', d.type];
  if (!d.canon) bar.push('legends');
  if (d.status === 'upcoming') bar.push('upcoming');

  const tags = [];
  if (!d.canon)               tags.push('<span class="tag legends">LEGENDS</span>');
  if (d.status === 'ongoing') tags.push('<span class="tag ongoing">ONGOING</span>');
  if (d.status === 'upcoming')tags.push('<span class="tag upcoming">SOON</span>');

  return `
    <div class="tl-row" data-id="${esc(d.id)}">
      <div class="tl-label">
        <div class="tl-name">${esc(d.name)} ${tags.join(' ')}</div>
        <div class="tl-sub">${esc(d.publisher)} · ${years(d)} · ${esc(countText(d))}</div>
      </div>
      <div class="tl-track">
        <div class="${bar.join(' ')}" style="left:${left}%;width:${width}%"></div>
      </div>
    </div>`;
}

function render(){
  const root = document.getElementById('timeline');
  root.innerHTML = SECTIONS.map(sec => {
    const items = DATA.filter(sec.f).sort((a,b) => a.rel[0] - b.rel[0]);
    if (!items.length) return '';
    return `
      <div class="tl-section${collapsed[sec.key] ? ' coll' : ''}">
        <div class="tl-head" data-key="${sec.key}">
          <span class="tl-dot" style="background:${sec.dot}"></span>
          <span class="tl-title">${esc(sec.label)}</span>
          <span class="tl-count">${items.length} series</span>
          <span class="tl-chev">▾</span>
        </div>
        <div class="tl-body">${items.map(rowHTML).join('')}</div>
      </div>`;
  }).join('');

  root.querySelectorAll('.tl-head').forEach(h =>
    h.onclick = () => { collapsed[h.dataset.key] = !collapsed[h.dataset.key]; render(); });
  root.querySelectorAll('.tl-row').forEach(r =>
    r.onclick = () => openDetail(BY_ID[r.dataset.id]));
}

// ═══ detail panel ════════════════════════════════════════════════════════
function openDetail(d){
  if (!d) return;
  document.getElementById('dp-title').textContent = d.name;
  document.getElementById('dp-sub').textContent = `${d.publisher} · ${years(d)}`;
  const tags = [
    `<span class="dp-tag ${d.franchise}">${d.franchise.toUpperCase()}</span>`,
    `<span class="dp-tag ${d.type}">${d.type.toUpperCase()}</span>`,
    `<span class="dp-tag ${d.canon ? 'canon' : 'legends'}">${d.canon ? 'CANON' : 'LEGENDS'}</span>`,
    `<span class="dp-tag ${d.status}">${d.status.toUpperCase()}</span>`,
    `<span class="dp-tag count">${esc(countText(d))}</span>`,
  ];
  document.getElementById('dp-meta').innerHTML = tags.join('');
  document.getElementById('dp-body').innerHTML = d.desc;
  const availEl = document.getElementById('dp-avail');
  availEl.innerHTML = (d.avail && d.avail.length)
    ? `<div class="dp-avail-label">WHERE TO READ</div>` +
      d.avail.map(a => `<a class="avail-btn ${esc(a.c)}" href="${esc(a.u)}" target="_blank" rel="noopener">${esc(a.l)} →</a>`).join('')
    : '';
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('scrim').classList.add('open');
}
function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('scrim').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ═══ init ════════════════════════════════════════════════════════════════
buildGridBackground();
renderRuler();
(async function(){
  try {
    const data = await loadData();
    DATA = (data && data.entries) ? data.entries : [];
    BY_ID = {}; DATA.forEach(d => BY_ID[d.id] = d);
    const m = (data && data.meta) || {};
    document.getElementById('subtitle').innerHTML =
      `${DATA.length} series · 1967–present` + (m.updated ? ` · updated <b>${esc(m.updated)}</b>` : '');
    render();
  } catch (e) {
    document.getElementById('subtitle').textContent = '';
    document.getElementById('error').innerHTML = `<div class="err">${esc(e.message || e)}</div>`;
  }
})();
</script>
</body>
</html>
